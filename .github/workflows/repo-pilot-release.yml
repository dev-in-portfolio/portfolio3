name: RepoPilot Release

on:
  push:
    tags:
      - "repo-pilot-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-22.04
            bundle: deb
            artifact_name: RepoPilot-Linux-amd64.deb
          - name: windows
            os: windows-latest
            bundle: msi
            artifact_name: RepoPilot-Windows-x64.zip
          - name: macos
            os: macos-latest
            bundle: dmg
            artifact_name: RepoPilot-macOS.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Rust
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Generate app icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PY'
          import struct, zlib
          w, h = 1024, 1024
          pixel = bytes([0x6E, 0xE7, 0xFF, 0xFF])
          row = b'\x00' + pixel * w
          raw = row * h
          comp = zlib.compress(raw, 9)
          def chunk(tag, data):
              return (struct.pack(">I", len(data)) + tag + data +
                      struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF))
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0)
          png = sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', comp) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon-source.png', 'wb') as f:
              f.write(png)
          PY
          pnpm dlx @tauri-apps/cli@1.6.0 icon src-tauri/icons/icon-source.png --output src-tauri/icons

      - name: Build Tauri bundle
        run: pnpm dlx @tauri-apps/cli@1.6.0 build --bundles ${{ matrix.platform.bundle }}

      - name: Prepare named artifact
        shell: bash
        run: |
          mkdir -p release-assets
          export PLATFORM="${{ matrix.platform.name }}"

          find_bundle() {
            python3 - <<'PY'
            import glob, os
            platform = os.environ["PLATFORM"]
            patterns = {
              "linux": [
                "src-tauri/target/**/*.deb",
                "src-tauri/target/**/*.AppImage",
              ],
              "windows": [
                "src-tauri/target/**/*.msi",
                "src-tauri/target/**/*-setup.exe",
                "src-tauri/target/**/repo-pilot.exe",
                "src-tauri/target/**/*.exe",
              ],
              "macos": [
                "src-tauri/target/**/*.dmg",
              ],
            }[platform]

            exclude_substrings = ["/.fingerprint/", "/build/", "/deps/"]
            for pattern in patterns:
              for path in glob.glob(pattern, recursive=True):
                if not os.path.isfile(path):
                  continue
                normalized = path.replace('\\\\', '/')
                if any(ex in normalized for ex in exclude_substrings):
                  continue
                print(path)
                raise SystemExit(0)
            raise SystemExit(1)
            PY
          }

          file_path=$(find_bundle) || true

          if [ -z "${file_path:-}" ] && [ "${{ matrix.platform.name }}" = "windows" ]; then
            echo "No windows bundle found, building fallback binary with cargo"
            cargo build --manifest-path src-tauri/Cargo.toml --release
            file_path=$(find_bundle) || true
          fi

          if [ -z "${file_path:-}" ]; then
            echo "No bundle file found. First 200 files under src-tauri/target:"
            python3 - <<'PY'
            import os
            count = 0
            for root, _, files in os.walk('src-tauri/target'):
              for name in files:
                print(os.path.join(root, name))
                count += 1
                if count >= 200:
                  raise SystemExit(0)
            PY
            exit 1
          fi

          if [ "${{ matrix.platform.name }}" = "windows" ]; then
            FILE_PATH="$file_path" ARTIFACT_PATH="release-assets/${{ matrix.platform.artifact_name }}" python3 - <<'PY'
            import os, zipfile
            src = os.environ['FILE_PATH']
            dst = os.environ['ARTIFACT_PATH']
            os.makedirs(os.path.dirname(dst), exist_ok=True)
            with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as zf:
              zf.write(src, arcname=os.path.basename(src))
            PY
          else
            cp "$file_path" "release-assets/${{ matrix.platform.artifact_name }}"
          fi

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-assets/${{ matrix.platform.artifact_name }}

  publish:
    name: Publish GitHub release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RepoPilot ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/RepoPilot-macOS.dmg/RepoPilot-macOS.dmg
            release-assets/RepoPilot-Windows-x64.zip/RepoPilot-Windows-x64.zip
            release-assets/RepoPilot-Linux-amd64.deb/RepoPilot-Linux-amd64.deb
