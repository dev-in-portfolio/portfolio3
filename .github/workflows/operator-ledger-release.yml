name: Operator Ledger Release

on:
  push:
    tags:
      - "operator-ledger-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-22.04
            artifact_name: OperatorLedger-Linux-x64.tar.gz
          - name: windows
            os: windows-latest
            artifact_name: OperatorLedger-Windows-x64.zip
          - name: macos
            os: macos-latest
            artifact_name: OperatorLedger-macOS.tar.gz

    env:
      APP_BIN: operator-ledger

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enable Corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Generate app icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          python - <<'PY'
          import struct, zlib
          w, h = 1024, 1024
          pixel = bytes([0x6E, 0xE7, 0xFF, 0xFF])
          row = b'\x00' + pixel * w
          raw = row * h
          comp = zlib.compress(raw, 9)
          def chunk(tag, data):
              return (struct.pack(">I", len(data)) + tag + data +
                      struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF))
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0)
          png = sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', comp) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon-source.png', 'wb') as f:
              f.write(png)
          PY
          pnpm dlx @tauri-apps/cli@1.6.0 icon src-tauri/icons/icon-source.png --output src-tauri/icons

      - name: Build desktop binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Prepare artifact archive
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ matrix.platform.name }}" = "windows" ]; then
            BIN_PATH="src-tauri/target/release/${APP_BIN}.exe"
          else
            BIN_PATH="src-tauri/target/release/${APP_BIN}"
          fi

          if [ ! -f "$BIN_PATH" ]; then
            echo "Expected binary not found: $BIN_PATH"
            find src-tauri/target/release -maxdepth 2 -type f | sed -n '1,200p'
            exit 1
          fi

          ARTIFACT_PATH="release-assets/${{ matrix.platform.artifact_name }}"
          if [ "${{ matrix.platform.name }}" = "windows" ]; then
            BIN_PATH="$BIN_PATH" ARTIFACT_PATH="$ARTIFACT_PATH" python - <<'PY'
            import os, zipfile
            src = os.environ['BIN_PATH']
            dst = os.environ['ARTIFACT_PATH']
            os.makedirs(os.path.dirname(dst), exist_ok=True)
            with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as zf:
              zf.write(src, arcname=os.path.basename(src))
            PY
          else
            BIN_PATH="$BIN_PATH" ARTIFACT_PATH="$ARTIFACT_PATH" python - <<'PY'
            import os, tarfile
            src = os.environ['BIN_PATH']
            dst = os.environ['ARTIFACT_PATH']
            os.makedirs(os.path.dirname(dst), exist_ok=True)
            with tarfile.open(dst, 'w:gz') as tf:
              tf.add(src, arcname=os.path.basename(src))
            PY
          fi

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-assets/${{ matrix.platform.artifact_name }}

  publish:
    name: Publish GitHub release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Operator Ledger ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/OperatorLedger-macOS.tar.gz/OperatorLedger-macOS.tar.gz
            release-assets/OperatorLedger-Windows-x64.zip/OperatorLedger-Windows-x64.zip
            release-assets/OperatorLedger-Linux-x64.tar.gz/OperatorLedger-Linux-x64.tar.gz
