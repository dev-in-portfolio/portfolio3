name: Operator Ledger Release

on:
  push:
    tags:
      - "operator-ledger-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Publish source release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archives
        run: |
          mkdir -p release-assets
          git archive --format=zip --output "release-assets/OperatorLedger-${GITHUB_REF_NAME}-source.zip" "$GITHUB_SHA"
          git archive --format=tar.gz --output "release-assets/OperatorLedger-${GITHUB_REF_NAME}-source.tar.gz" "$GITHUB_SHA"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: OperatorLedger-release-assets-${{ github.ref_name }}
          path: release-assets/*

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Operator Ledger ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
