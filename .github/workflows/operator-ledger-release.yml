name: Operator Ledger Release

on:
  push:
    tags:
      - "operator-ledger-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-22.04
            bundle: appimage
            artifact_name: OperatorLedger-Linux-x86_64.AppImage
            bundle_glob: src-tauri/target/release/bundle/appimage/*.AppImage
          - name: windows
            os: windows-latest
            bundle: nsis
            artifact_name: OperatorLedger-Windows-x64-setup.exe
            bundle_glob: src-tauri/target/release/bundle/nsis/*-setup.exe
          - name: macos
            os: macos-latest
            bundle: dmg
            artifact_name: OperatorLedger-macOS.dmg
            bundle_glob: src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Rust
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Generate app icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PY'
          import struct, zlib
          w, h = 1024, 1024
          pixel = bytes([0x6E, 0xE7, 0xFF, 0xFF])
          row = b'\x00' + pixel * w
          raw = row * h
          comp = zlib.compress(raw, 9)
          def chunk(tag, data):
              return (struct.pack(">I", len(data)) + tag + data +
                      struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF))
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0)
          png = sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', comp) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon-source.png', 'wb') as f:
              f.write(png)
          PY
          pnpm dlx @tauri-apps/cli@1.6.0 icon src-tauri/icons/icon-source.png --output src-tauri/icons

      - name: Build Tauri bundle
        run: pnpm dlx @tauri-apps/cli@1.6.0 build --bundles ${{ matrix.platform.bundle }}

      - name: Prepare named artifact
        shell: bash
        run: |
          mkdir -p release-assets
          file_path=$(ls ${{ matrix.platform.bundle_glob }} | head -n 1)
          cp "$file_path" "release-assets/${{ matrix.platform.artifact_name }}"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-assets/${{ matrix.platform.artifact_name }}

  publish:
    name: Publish GitHub release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Operator Ledger ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/OperatorLedger-macOS.dmg/OperatorLedger-macOS.dmg
            release-assets/OperatorLedger-Windows-x64-setup.exe/OperatorLedger-Windows-x64-setup.exe
            release-assets/OperatorLedger-Linux-x86_64.AppImage/OperatorLedger-Linux-x86_64.AppImage
