<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NEXUS — Home</title>
  <style>
    :root{
      --bg0:#070914;
      --bg1:#050610;
      --ink:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --glow:rgba(160,200,255,.45);
      --ring:rgba(255,255,255,.16);
      --ring2:rgba(255,255,255,.09);
      --card:rgba(255,255,255,.06);
      --card2:rgba(255,255,255,.03);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(120,180,255,.18), transparent 60%),
        radial-gradient(900px 600px at 70% 65%, rgba(120,255,210,.10), transparent 55%),
        radial-gradient(700px 600px at 50% 40%, rgba(255,120,220,.08), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow:hidden;
    }
    .wrap{ position:relative; width:100%; height:100vh; }
    .topbar{
      position:absolute; left:18px; right:18px; top:18px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      z-index:5; padding:10px 12px;
      background:linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--ring2);
      border-radius:16px;
      backdrop-filter: blur(10px);
    }
    .brand{ display:flex; flex-direction:column; gap:2px; line-height:1.1; }
    .brand b{ letter-spacing:.12em; font-size:12px; opacity:.9; }
    .brand span{ font-size:13px; color:var(--muted); }
    .hint{ font-size:12px; color:var(--muted); opacity:.85; white-space:nowrap; }

    .sky{
      position:absolute; inset:0; pointer-events:none; opacity:.55;
      background-image:
        radial-gradient(2px 2px at 12% 22%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1px 1px at 35% 28%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(2px 2px at 70% 30%, rgba(255,255,255,.75), transparent 60%),
        radial-gradient(1px 1px at 82% 55%, rgba(255,255,255,.65), transparent 60%),
        radial-gradient(2px 2px at 55% 70%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(1px 1px at 18% 68%, rgba(255,255,255,.65), transparent 60%);
      filter: drop-shadow(0 0 10px rgba(160,200,255,.2));
    }

    svg#lines{
      position:absolute; inset:0; width:100%; height:100%;
      z-index:1; pointer-events:none; opacity:.7;
    }

    .node{
      position:absolute; z-index:3;
      transform: translate(-50%, -50%);
      text-decoration:none; color:var(--ink);
      padding:12px 14px;
      border-radius:18px;
      border:1px solid var(--ring);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 12px 40px rgba(0,0,0,.35);
      display:flex; align-items:center; gap:10px;
      min-width:160px; max-width:220px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .dot{
      width:12px; height:12px; border-radius:999px;
      background: rgba(200,230,255,.85);
      box-shadow: 0 0 18px rgba(160,200,255,.55);
      flex:0 0 auto;
    }
    .label{ display:flex; flex-direction:column; gap:2px; line-height:1.1; }
    .label b{ font-size:14px; letter-spacing:.06em; }
    .label span{ font-size:12px; color:var(--muted); }
    .node:active{ transform: translate(-50%, -50%) scale(.99); }
    .node:hover{ border-color: rgba(190,220,255,.35); box-shadow: 0 0 35px rgba(160,200,255,.10); }

    #n-apps{ left:50%; top:42%; }
    #n-utils{ left:26%; top:56%; }
    #n-caps{ left:74%; top:56%; }
    #n-about{ left:38%; top:72%; }
    #n-contact{ left:62%; top:72%; }

    @media (max-width: 720px){
      .node{ min-width:150px; }
      #n-apps{ left:50%; top:34%; }
      #n-utils{ left:25%; top:52%; }
      #n-caps{ left:75%; top:52%; }
      #n-about{ left:30%; top:70%; }
      #n-contact{ left:70%; top:70%; }
      .hint{ display:none; }
    }
  </style>
</head>

<body>
  <div class="wrap" id="wrap">
    <div class="sky"></div>

    <div class="topbar">
      <div class="brand">
        <b>NEXUS</b>
        <span>Home — routing hub</span>
      </div>
      <div class="hint">Tap a node • Absolute links (no subpath traps)</div>
    </div>

    <svg id="lines" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(180,220,255,.55)"/>
          <stop offset="100%" stop-color="rgba(180,255,220,.25)"/>
        </linearGradient>
      </defs>
      <path id="p1" d="" stroke="url(#lg)" stroke-width="2" fill="none" opacity=".8"/>
      <path id="p2" d="" stroke="url(#lg)" stroke-width="2" fill="none" opacity=".6"/>
      <path id="p3" d="" stroke="url(#lg)" stroke-width="2" fill="none" opacity=".6"/>
      <path id="p4" d="" stroke="url(#lg)" stroke-width="2" fill="none" opacity=".5"/>
      <circle id="cglow" cx="500" cy="420" r="120" fill="rgba(160,200,255,.06)"/>
    </svg>

    <a class="node" id="n-apps" href="https://dev-in-portfolio-apps.netlify.app/" rel="noopener">
      <span class="dot"></span>
      <span class="label"><b>APPS</b><span>constellation of projects</span></span>
    </a>

    <a class="node" id="n-utils" href="https://dev-in-portfolio-utilities.netlify.app/" rel="noopener">
      <span class="dot"></span>
      <span class="label"><b>UTILITIES</b><span>tools & helpers</span></span>
    </a>

    <a class="node" id="n-caps" href="https://dev-in-portfolio-capabilities.netlify.app/" rel="noopener">
      <span class="dot"></span>
      <span class="label"><b>CAPABILITIES</b><span>skills & proof</span></span>
    </a>

    <a class="node" id="n-about" href="https://dev-in-portfolio-about.netlify.app/" rel="noopener">
      <span class="dot"></span>
      <span class="label"><b>ABOUT</b><span>story & background</span></span>
    </a>

    <a class="node" id="n-contact" href="https://dev-in-portfolio-contact.netlify.app/" rel="noopener">
      <span class="dot"></span>
      <span class="label"><b>CONTACT</b><span>reach me</span></span>
    </a>
  </div>

  <script>
    function centerOf(el){
      const r = el.getBoundingClientRect();
      const w = window.innerWidth, h = window.innerHeight;
      const x = ((r.left + r.width/2) / w) * 1000;
      const y = ((r.top + r.height/2) / h) * 1000;
      return {x,y};
    }
    function curve(a,b, bend=0.18){
      const dx = b.x - a.x, dy = b.y - a.y;
      const cx1 = a.x + dx * 0.35 - dy * bend;
      const cy1 = a.y + dy * 0.35 + dx * bend;
      const cx2 = a.x + dx * 0.65 - dy * bend;
      const cy2 = a.y + dy * 0.65 + dx * bend;
      return `M ${a.x} ${a.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${b.x} ${b.y}`;
    }
    function draw(){
      const apps = document.getElementById('n-apps');
      const utils = document.getElementById('n-utils');
      const caps = document.getElementById('n-caps');
      const about = document.getElementById('n-about');
      const contact = document.getElementById('n-contact');

      const A = centerOf(apps), U = centerOf(utils), C = centerOf(caps), B = centerOf(about), K = centerOf(contact);

      document.getElementById('p1').setAttribute('d', curve(A,U,0.22));
      document.getElementById('p2').setAttribute('d', curve(A,C,0.22));
      document.getElementById('p3').setAttribute('d', curve(A,B,0.10));
      document.getElementById('p4').setAttribute('d', curve(A,K,0.10));

      document.getElementById('cglow').setAttribute('cx', A.x);
      document.getElementById('cglow').setAttribute('cy', A.y);
    }
    window.addEventListener('resize', () => requestAnimationFrame(draw));
    window.addEventListener('load', () => requestAnimationFrame(draw));
    setTimeout(draw, 80);
  </script>
</body>
</html>
