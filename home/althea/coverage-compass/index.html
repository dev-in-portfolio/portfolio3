/* ===== Phase 4: Accessibility, Contrast, & Perception ===== */
/* Kill default shiny-blue links globally (unless explicitly styled) */
a:link, a:visited{
  color: rgba(255,255,255,0.92);
  text-decoration-color: rgba(255,255,255,0.35);
}
a:hover{
  color: rgba(255,255,255,0.98);
  text-decoration-color: rgba(155,209,255,0.70);
}
a:active{
  color: rgba(255,255,255,1);
}

/* If something is intended to look like a button, it should feel like one */
a.btn, a.buttonlike, .nxs-btn, .nxs-pill, .pillBtn, button, [role="button"]{
  text-decoration: none !important;
}

/* Keyboard: always visible focus, never the default outline that disappears on dark backgrounds */
:focus-visible{
  outline: 2px solid rgba(155,209,255,0.85);
  outline-offset: 4px;
}

/* Increase tap target comfort on mobile */
a, button{
  -webkit-tap-highlight-color: rgba(155,209,255,0.25);
}


/* ===== Phase 5: Performance, SEO, & Production Paranoia ===== */
/* Reduce layout shift from images */
img{ height:auto; }

    </div>

<script>
const APP='coverage-compass';
const DATASET=`/data/althea/${APP}.json`;
async function loadDataset(){
  try{
    const r=await fetch(DATASET,{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    document.getElementById('src').textContent = 'dataset: ' + DATASET;
    return Array.isArray(j) ? j : (Array.isArray(j.items)?j.items:[]);
  }catch(e){
    document.getElementById('src').textContent = 'dataset missing: ' + DATASET;
    return [];
  }
}
let items=[];
loadDataset().then(d=>items=d);

function render(mode, , answer){
  const box=document.getElementById('a');
  box.style.display='block';
  box.innerHTML = '';
  const h=document.createElement('div');
  h.style.fontWeight='800';
  h.textContent = mode;
  const m=document.createElement('div');
  m.className='small muted';
  m.textContent = ;
  const a=document.createElement('div');
  a.style.marginTop='10px';
  a.style.whiteSpace='pre-wrap';
  a.textContent = answer || '(no answer)';
  box.appendChild(h); box.appendChild(m); box.appendChild(a);
}

async function run(){
  const q=document.getElementById('q').value.trim();
  if(!q) return;
  render('Offline match', 'matching…', '');
  const {best, bestScore} = window.AltheaFallback.bestMatch(q, items);
  if(best && bestScore>=0.18){
    render('Offline match', `closest: “${best.q||best.question||'—'}” • score ${bestScore.toFixed(2)}`, best.a||best.answer||'');
  }else{
    render('Offline', `no close match • best score ${Math.max(0,bestScore).toFixed(2)}`, "I’m offline and couldn’t find a close match in this app’s fallback list. Try rephrasing with different keywords (what/where/how), or ask about a specific button/control name.");
  }
}

document.getElementById('go').addEventListener('click', run);
document.getElementById('q').addEventListener('keydown', e=>{ if(e.key==='Enter') run(); });
</script>
