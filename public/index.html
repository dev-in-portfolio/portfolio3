<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Island Index</title>
    <style>
      :root { --bg:#091223; --card:#0f1a32; --txt:#e9f0ff; --m:#9ab0db; --a:#6ce4ff; --b:#91a2ff; --bd:#2f4678; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter, system-ui, sans-serif; color:var(--txt); background: radial-gradient(circle at 20% 0, #1d2f5f 0, #091223 58%); }
      .wrap { max-width:1040px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .controls { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:8px; }
      input,select,button { border-radius:10px; border:1px solid #355697; background:#0b1530; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#061124; font-weight:700; border:none; cursor:pointer; }
      .grid { margin-top:12px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
      .item { border:1px solid #2b4477; border-radius:10px; background:#0d1733; padding:10px; }
      .m { color:var(--m); font-size:.9rem; }
      .views { margin-top:12px; display:grid; gap:8px; }
      @media(max-width:920px){ .controls{grid-template-columns:1fr 1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Island Index</h1>
        <p class="m">Filterable content index with saved views (Neon-backed).</p>
        <p id="status" class="m">Checking API...</p>
        <div class="controls">
          <input id="search" placeholder="Search title" />
          <input id="tag" placeholder="Tag" />
          <select id="sort"><option value="newest">Newest</option><option value="score">Score</option></select>
          <input id="viewName" placeholder="Save view as" />
          <button id="saveView">Save View</button>
        </div>
      </section>
      <section class="card" style="margin-top:12px;">
        <h2>Items</h2>
        <div id="items" class="grid"></div>
      </section>
      <section class="card" style="margin-top:12px;">
        <h2>Saved Views</h2>
        <div id="views" class="views"></div>
      </section>
    </main>
    <script>
      const key = localStorage.islandIndexKey || (localStorage.islandIndexKey = `island-index-${crypto.randomUUID()}`);
      const headers = { 'Content-Type': 'application/json', 'X-Device-Key': key };

      const statusEl = document.getElementById('status');
      const itemsEl = document.getElementById('items');
      const viewsEl = document.getElementById('views');
      const searchEl = document.getElementById('search');
      const tagEl = document.getElementById('tag');
      const sortEl = document.getElementById('sort');

      function queryState() { return { search: searchEl.value.trim(), tag: tagEl.value.trim(), sort: sortEl.value }; }

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function loadItems() {
        const qs = new URLSearchParams(queryState()).toString();
        const res = await fetch(`/api/items?${qs}`);
        const data = await res.json();
        itemsEl.innerHTML = '';
        data.items.forEach((item) => {
          const el = document.createElement('article');
          el.className = 'item';
          el.innerHTML = `<strong>${item.title}</strong><p>${item.summary}</p><div class='m'>Score ${item.score} | ${item.tags.join(' · ')}</div>`;
          itemsEl.appendChild(el);
        });
      }

      async function loadViews() {
        const res = await fetch('/api/views', { headers });
        const data = await res.json();
        viewsEl.innerHTML = '';
        const views = Array.isArray(data.views) ? data.views : [];
        if (!views.length) { viewsEl.innerHTML = '<div class="m">No saved views.</div>'; return; }
        views.forEach((v) => {
          const row = document.createElement('div');
          row.className = 'item';
          row.innerHTML = `<strong>${v.name}</strong><div class='m'>${new Date(v.updated_at).toLocaleString()}</div>`;
          const buttons = document.createElement('div');
          buttons.style.display='grid'; buttons.style.gridTemplateColumns='1fr 1fr'; buttons.style.gap='8px'; buttons.style.marginTop='8px';
          const apply = document.createElement('button'); apply.textContent='Apply';
          apply.onclick = () => {
            searchEl.value = v.state.search || '';
            tagEl.value = v.state.tag || '';
            sortEl.value = v.state.sort || 'newest';
            loadItems();
          };
          const del = document.createElement('button'); del.textContent='Delete';
          del.onclick = async () => { await fetch(`/api/views?id=${encodeURIComponent(v.id)}`, { method:'DELETE', headers }); await loadViews(); };
          buttons.append(apply, del); row.appendChild(buttons); viewsEl.appendChild(row);
        });
      }

      ['input','change'].forEach((ev) => {
        searchEl.addEventListener(ev, () => loadItems());
        tagEl.addEventListener(ev, () => loadItems());
        sortEl.addEventListener(ev, () => loadItems());
      });

      document.getElementById('saveView').onclick = async () => {
        const name = document.getElementById('viewName').value.trim();
        if (!name) return;
        await fetch('/api/views', { method:'POST', headers, body: JSON.stringify({ name, state: queryState() }) });
        document.getElementById('viewName').value = '';
        await loadViews();
      };

      health().catch(() => { statusEl.textContent = 'API unavailable.'; });
      loadItems();
      loadViews().catch(() => { viewsEl.innerHTML = '<div class="m">Failed to load views.</div>'; });
    </script>
  </body>
</html>
