<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RelayRoom</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      *{box-sizing:border-box;} body{margin:0;font-family:"Space Grotesk",system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a1222,#0f1c38);}
      .wrap{max-width:1100px;margin:0 auto;padding:28px 16px 58px;} .hero,.card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:14px;}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;} .card{background:var(--panel2);}
      label{display:block;margin:8px 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
      input,textarea,select,button{width:100%;border-radius:10px;border:1px solid var(--line);background:#0d1931;color:var(--text);padding:8px 10px;font:inherit;}
      textarea{min-height:100px;resize:vertical;} .row{display:flex;gap:8px;} .row>*{flex:1;}
      button{border:0;background:linear-gradient(90deg,#70dcff,#90abff);color:#03152b;font-weight:700;cursor:pointer;} button.secondary{border:1px solid var(--line);background:#172744;color:#dbe9ff;}
      .list{display:grid;gap:8px;margin-top:8px;max-height:430px;overflow:auto;} .item{border:1px solid var(--line);border-radius:10px;background:#0d1830;padding:10px;} .muted{color:var(--muted);}
      @media (max-width:900px){.grid{grid-template-columns:1fr;}.row{flex-direction:column;}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero"><h1 style="margin:0 0 8px">RelayRoom</h1><p class="muted" style="margin:0">Shared rooms with invite codes and threaded notes.</p></section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Rooms</h3>
          <label>New room name</label><input id="roomName" placeholder="Incident Bridge" />
          <div class="row" style="margin-top:8px"><button id="createRoom">Create Room</button><button id="reload" class="secondary">Reload</button></div>
          <label>Join by invite code</label><input id="inviteCode" placeholder="AB12CD34" />
          <button id="joinRoom" style="margin-top:8px">Join Room</button>
          <label>Active room</label><select id="roomSelect"></select>
          <h3 style="margin:12px 0 0">New Note</h3>
          <label>Title</label><input id="noteTitle" placeholder="Summary" />
          <label>Body</label><textarea id="noteBody">Room notes and coordination updates...</textarea>
          <button id="postNote" style="margin-top:8px">Post Note</button>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card"><h3 style="margin:0">Notes</h3><div id="notes" class="list"></div></article>
      </section>
    </main>
    <script>
      const keyName='relayroom_device_key'; let deviceKey=localStorage.getItem(keyName); if(!deviceKey&&crypto.randomUUID){deviceKey=crypto.randomUUID();localStorage.setItem(keyName,deviceKey);}
      let activeRoom=''; const msg=(t,b=false)=>{const el=document.getElementById('msg');el.textContent=t;el.style.color=b?'#ffb7b7':'#a1b6de';};
      async function api(path,opts={}){const res=await fetch(path,{...opts,headers:{'content-type':'application/json','X-Device-Key':deviceKey,...(opts.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.detail||data.error||`http_${res.status}`);return data;}
      async function loadRooms(){const data=await api('/api/relayroom/rooms');const sel=document.getElementById('roomSelect');sel.innerHTML='';for(const r of data.rooms||[]){const o=document.createElement('option');o.value=r.id;o.textContent=`${r.name} (${r.invite_code})`;sel.appendChild(o);}if(!activeRoom&&sel.value)activeRoom=sel.value;if(activeRoom)sel.value=activeRoom;if(sel.value){activeRoom=sel.value;await loadNotes();}}
      async function loadNotes(){if(!activeRoom)return;const data=await api(`/api/relayroom/rooms/${activeRoom}/notes`);const root=document.getElementById('notes');root.innerHTML='';for(const n of data.notes||[]){const c=document.createElement('div');c.className='item';c.innerHTML=`<strong>${n.title||'Note'}</strong><div class="muted">${new Date(n.created_at).toLocaleString()}</div><div>${n.body}</div>`;root.appendChild(c);}}
      document.getElementById('createRoom').onclick=async()=>{try{await api('/api/relayroom/rooms',{method:'POST',body:JSON.stringify({name:document.getElementById('roomName').value.trim()})});msg('Room created.');await loadRooms();}catch(e){msg(e.message,true);}};
      document.getElementById('joinRoom').onclick=async()=>{try{const out=await api('/api/relayroom/join',{method:'POST',body:JSON.stringify({inviteCode:document.getElementById('inviteCode').value.trim()})});activeRoom=out.room.id;msg('Joined room.');await loadRooms();}catch(e){msg(e.message,true);}};
      document.getElementById('postNote').onclick=async()=>{try{if(!activeRoom)throw new Error('select room first');await api(`/api/relayroom/rooms/${activeRoom}/notes`,{method:'POST',body:JSON.stringify({title:document.getElementById('noteTitle').value.trim(),body:document.getElementById('noteBody').value})});msg('Note posted.');await loadNotes();}catch(e){msg(e.message,true);}};
      document.getElementById('roomSelect').onchange=async(e)=>{activeRoom=e.target.value;await loadNotes();};
      document.getElementById('reload').onclick=loadRooms;
      loadRooms().catch(e=>msg(e.message,true));
    </script>
  </body>
</html>
