<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dash FlowLens</title>
    <style>
      :root { --bg:#0b1020; --card:#121b33; --txt:#eef3ff; --m:#a6b8de; --a:#7ce2ff; --b:#8fa5ff; --bd:#2f4475; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#1e2f60 0,#0b1020 58%); }
      .wrap { max-width:1080px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .grid { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; margin-top:12px; }
      .stack { display:grid; gap:10px; }
      input,select,textarea,button { width:100%; border:1px solid #395b9a; border-radius:10px; background:#0f1730; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#061124; font-weight:700; border:none; cursor:pointer; }
      table { width:100%; border-collapse: collapse; }
      th,td { border-bottom:1px solid #2f4475; text-align:left; padding:6px; }
      .m { color:var(--m); font-size:.9rem; }
      @media(max-width:960px){ .grid{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Dash FlowLens</h1>
        <p class="m">Pipeline flow explorer with stage throughput, dwell, and drop-off metrics.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="grid">
        <article class="card stack">
          <h2>Add Flow Event</h2>
          <input id="entity" placeholder="entity_id" />
          <input id="stage" placeholder="stage" />
          <label class="m">Entered At</label><input id="entered" type="datetime-local" />
          <label class="m">Exited At (optional)</label><input id="exited" type="datetime-local" />
          <button id="add">Add Event</button>
          <div class="m">Tip: add multiple stages for the same entity to generate transitions.</div>
        </article>
        <article class="card stack">
          <h2>Filters</h2>
          <label class="m">Lookback Days</label><input id="days" type="number" min="1" max="180" value="30" />
          <label class="m">Stage filter (optional)</label><input id="stageFilter" />
          <button id="refresh">Refresh Summary</button>
        </article>
      </section>
      <section class="card" style="margin-top:12px;">
        <h2>Summary</h2>
        <div id="summary" class="m">No data yet.</div>
      </section>
    </main>
    <script>
      const key = localStorage.dashFlowlensKey || (localStorage.dashFlowlensKey = `dash-flowlens-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');

      const isoFromLocal = (v) => v ? new Date(v).toISOString() : null;

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      function renderTable(title, rows, cols) {
        if (!rows.length) return `<h3>${title}</h3><div class='m'>No rows.</div>`;
        return `<h3>${title}</h3><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      }

      async function refresh() {
        const days = Number(document.getElementById('days').value || 30);
        const stageFilter = document.getElementById('stageFilter').value.trim();
        const qs = new URLSearchParams({ days: String(days) });
        if (stageFilter) qs.set('stage', stageFilter);
        const res = await fetch(`/api/flowlens/summary?${qs.toString()}`, { headers });
        const data = await res.json();
        if (!res.ok) { summaryEl.textContent = data.error || data.detail || 'Failed to load summary'; return; }
        summaryEl.innerHTML = [
          renderTable('Throughput', data.throughput || [], ['stage','count']),
          renderTable('Average Dwell (minutes)', data.dwell || [], ['stage','avg_minutes']),
          renderTable('Transitions', data.transitions || [], ['from','to','count']),
          renderTable('Drop-off', data.dropoff || [], ['stage','next_stage','completion_rate'])
        ].join('');
      }

      document.getElementById('add').onclick = async () => {
        const payload = {
          entity_id: document.getElementById('entity').value.trim(),
          stage: document.getElementById('stage').value.trim(),
          entered_at: isoFromLocal(document.getElementById('entered').value),
          exited_at: isoFromLocal(document.getElementById('exited').value)
        };
        const res = await fetch('/api/flowlens/events', { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) { alert(data.error || data.detail || 'Failed to add event'); return; }
        await refresh();
      };

      document.getElementById('refresh').onclick = refresh;

      health().catch(() => { statusEl.textContent = 'API unavailable.'; });
      refresh();
    </script>
  </body>
</html>
