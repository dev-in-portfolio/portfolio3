<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwik SignalTill</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1222,#0f1c38); }
      .wrap { max-width:1100px; margin:0 auto; padding:28px 16px 58px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .card { background:var(--panel2); }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
      input,textarea,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1931; color:var(--text); padding:8px 10px; font:inherit; }
      .row { display:flex; gap:8px; } .row > * { flex:1; }
      button { border:0; background:linear-gradient(90deg,#70dcff,#90abff); color:#03152b; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172744; color:#dbe9ff; }
      .list { display:grid; gap:8px; margin-top:8px; max-height:470px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; background:#0d1830; padding:10px; }
      .muted { color:var(--muted); } #msg { min-height:20px; }
      @media (max-width:900px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero"><h1 style="margin:0 0 8px">Qwik SignalTill</h1><p class="muted" style="margin:0">Signal board with threshold rules and health status tracking.</p></section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Create Signal</h3>
          <label>Name</label><input id="name" placeholder="CPU Usage" />
          <label>Kind</label><input id="kind" value="system" />
          <label>Value</label><input id="valueNum" type="number" value="72" />
          <label>Unit</label><input id="valueUnit" value="%" />
          <label>Note</label><input id="note" placeholder="Node pool average" />
          <div class="row" style="margin-top:8px"><button id="create">Create Signal</button><button id="reload" class="secondary">Reload</button></div>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card">
          <h3 style="margin:0">Board</h3>
          <div id="list" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      const keyName = 'qwik_signaltill_device_key';
      let deviceKey = localStorage.getItem(keyName);
      if (!deviceKey && crypto.randomUUID) { deviceKey = crypto.randomUUID(); localStorage.setItem(keyName, deviceKey); }
      const msg = (t, bad = false) => { const el = document.getElementById('msg'); el.textContent = t; el.style.color = bad ? '#ffb7b7' : '#a1b6de'; };
      async function api(path, opts = {}) {
        const res = await fetch(path, { ...opts, headers: { 'content-type': 'application/json', 'X-Device-Key': deviceKey, ...(opts.headers || {}) } });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }
      async function load() {
        try {
          const data = await api('/api/qst/board');
          const root = document.getElementById('list');
          root.innerHTML = '';
          for (const s of data.signals || []) {
            const card = document.createElement('div');
            card.className = 'item';
            card.innerHTML = `<strong>${s.name}</strong><div class="muted">${s.status} • ${s.value_num ?? '-'}${s.value_unit || ''}</div><div class="muted">${s.note || ''}</div>`;
            const row = document.createElement('div');
            row.className = 'row';
            row.style.marginTop = '8px';
            const warn = document.createElement('button');
            warn.className = 'secondary';
            warn.textContent = 'Set Warn > 80';
            warn.onclick = async () => { await api(`/api/qst/signals/${s.id}/rule`, { method: 'POST', body: JSON.stringify({ warnIfGt: 80 }) }); await load(); };
            const del = document.createElement('button');
            del.className = 'secondary';
            del.textContent = 'Delete';
            del.onclick = async () => { await api(`/api/qst/signals/${s.id}`, { method: 'DELETE' }); await load(); };
            row.appendChild(warn); row.appendChild(del); card.appendChild(row); root.appendChild(card);
          }
        } catch (e) { msg(e.message, true); }
      }
      document.getElementById('create').onclick = async () => {
        try {
          await api('/api/qst/signals', {
            method: 'POST',
            body: JSON.stringify({
              name: document.getElementById('name').value.trim(),
              kind: document.getElementById('kind').value.trim(),
              valueNum: Number(document.getElementById('valueNum').value),
              valueUnit: document.getElementById('valueUnit').value.trim(),
              note: document.getElementById('note').value.trim()
            })
          });
          msg('Signal created.');
          await load();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('reload').onclick = load;
      load();
    </script>
  </body>
</html>
