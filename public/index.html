<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remix DiffAtlas</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1222,#0f1c38); }
      .wrap { max-width:1120px; margin:0 auto; padding:28px 16px 58px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .card { background:var(--panel2); }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
      input,textarea,select,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1931; color:var(--text); padding:8px 10px; font:inherit; }
      textarea { min-height:120px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .row { display:flex; gap:8px; }
      .row > * { flex:1; }
      button { border:0; background:linear-gradient(90deg,#70dcff,#90abff); color:#03152b; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172744; color:#dbe9ff; }
      .list { display:grid; gap:8px; margin-top:8px; max-height:420px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; background:#0d1830; padding:10px; }
      .muted { color:var(--muted); }
      #msg { min-height:20px; }
      @media (max-width: 900px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1 style="margin:0 0 8px">Remix DiffAtlas</h1>
        <p class="muted" style="margin:0">Create dataset snapshots and compute added/removed/modified deltas.</p>
      </section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Job + Snapshot</h3>
          <label>Job name</label>
          <input id="jobName" placeholder="Catalog compare" />
          <label>Key field</label>
          <input id="keyField" value="id" />
          <div class="row" style="margin-top:8px">
            <button id="createJob">Create Job</button>
            <button id="reloadJobs" class="secondary">Reload</button>
          </div>
          <label>Active job</label>
          <select id="jobSelect"></select>
          <label>Snapshot label</label>
          <input id="snapshotLabel" placeholder="baseline-2026-03-04" />
          <label>Records JSON Array</label>
          <textarea id="records">[{"id":"a","name":"alpha","score":1},{"id":"b","name":"beta","score":2}]</textarea>
          <button id="createSnapshot" style="margin-top:8px">Create Snapshot</button>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card">
          <h3 style="margin:0">Compare</h3>
          <label>Base snapshot</label>
          <select id="baseSnap"></select>
          <label>Compare snapshot</label>
          <select id="cmpSnap"></select>
          <button id="runCompare" style="margin-top:8px">Run Compare</button>
          <div id="snapshots" class="list"></div>
          <h3 style="margin:10px 0 0">Results</h3>
          <div id="results" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      let currentJob = '';
      const msg = (t, bad = false) => {
        const el = document.getElementById('msg');
        el.textContent = t;
        el.style.color = bad ? '#ffb7b7' : '#a1b6de';
      };
      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: { 'content-type': 'application/json', ...(opts.headers || {}) }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }
      async function loadJobs() {
        const data = await api('/api/jobs');
        const sel = document.getElementById('jobSelect');
        sel.innerHTML = '';
        for (const job of data.items || []) {
          const opt = document.createElement('option');
          opt.value = job.id;
          opt.textContent = `${job.name} (${job.key_field})`;
          sel.appendChild(opt);
        }
        if (!currentJob && sel.value) currentJob = sel.value;
        if (currentJob) sel.value = currentJob;
        if (sel.value) {
          currentJob = sel.value;
          await loadSnapshots();
          await loadResults();
        }
      }
      async function loadSnapshots() {
        if (!currentJob) return;
        const data = await api(`/api/jobs/${currentJob}/snapshots`);
        const root = document.getElementById('snapshots');
        root.innerHTML = '';
        const base = document.getElementById('baseSnap');
        const cmp = document.getElementById('cmpSnap');
        base.innerHTML = '';
        cmp.innerHTML = '';
        for (const item of data.items || []) {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `<strong>${item.label}</strong><div class="muted">${item.record_count} records</div>`;
          root.appendChild(card);
          const a = document.createElement('option');
          const b = document.createElement('option');
          a.value = b.value = item.id;
          a.textContent = b.textContent = item.label;
          base.appendChild(a);
          cmp.appendChild(b);
        }
      }
      async function loadResults() {
        if (!currentJob) return;
        const data = await api(`/api/jobs/${currentJob}/results`);
        const root = document.getElementById('results');
        root.innerHTML = '';
        for (const r of data.items || []) {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `<strong>${new Date(r.created_at).toLocaleString()}</strong><div class="muted">added ${r.added_count} • removed ${r.removed_count} • modified ${r.modified_count}</div>`;
          root.appendChild(card);
        }
      }
      document.getElementById('createJob').onclick = async () => {
        try {
          const created = await api('/api/jobs', {
            method: 'POST',
            body: JSON.stringify({
              name: document.getElementById('jobName').value.trim(),
              keyField: document.getElementById('keyField').value.trim() || 'id'
            })
          });
          currentJob = created.id;
          msg('Job created.');
          await loadJobs();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('jobSelect').onchange = async (e) => {
        currentJob = e.target.value;
        await loadSnapshots();
        await loadResults();
      };
      document.getElementById('createSnapshot').onclick = async () => {
        try {
          if (!currentJob) throw new Error('create/select a job first');
          const records = JSON.parse(document.getElementById('records').value);
          await api(`/api/jobs/${currentJob}/snapshots`, {
            method: 'POST',
            body: JSON.stringify({ label: document.getElementById('snapshotLabel').value.trim(), records })
          });
          msg('Snapshot created.');
          await loadSnapshots();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('runCompare').onclick = async () => {
        try {
          if (!currentJob) throw new Error('select a job first');
          const out = await api(`/api/jobs/${currentJob}/compare`, {
            method: 'POST',
            body: JSON.stringify({
              baseSnapshot: document.getElementById('baseSnap').value,
              compareSnapshot: document.getElementById('cmpSnap').value
            })
          });
          msg(`Compare done: +${out.summary.added} / -${out.summary.removed} / Δ${out.summary.modified}`);
          await loadResults();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('reloadJobs').onclick = loadJobs;
      loadJobs().catch((e) => msg(e.message, true));
    </script>
  </body>
</html>
