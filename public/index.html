<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwik CardForge</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1222,#0f1c38); }
      .wrap { max-width:1100px; margin:0 auto; padding:28px 16px 58px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .card { background:var(--panel2); }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
      input,textarea,select,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1931; color:var(--text); padding:8px 10px; font:inherit; }
      textarea { min-height:110px; resize:vertical; }
      .row { display:flex; gap:8px; } .row > * { flex:1; }
      button { border:0; background:linear-gradient(90deg,#70dcff,#90abff); color:#03152b; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172744; color:#dbe9ff; }
      .list { display:grid; gap:8px; margin-top:8px; max-height:450px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; background:#0d1830; padding:10px; }
      .muted { color:var(--muted); } #msg { min-height:20px; }
      @media (max-width:900px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero"><h1 style="margin:0 0 8px">Qwik CardForge</h1><p class="muted" style="margin:0">Compose card pages and publish shareable card sets.</p></section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Page Builder</h3>
          <label>Page title</label><input id="pageTitle" placeholder="Incident Playbook" />
          <label>Slug</label><input id="pageSlug" placeholder="incident-playbook" />
          <div class="row" style="margin-top:8px"><button id="createPage">Create Page</button><button id="reload" class="secondary">Reload</button></div>
          <label>Active page</label><select id="pageSelect"></select>
          <label>Card title</label><input id="cardTitle" placeholder="Immediate actions" />
          <label>Card body</label><textarea id="cardBody">Check alerts, identify blast radius, post status update.</textarea>
          <button id="addCard" style="margin-top:8px">Add Text Card</button>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card">
          <h3 style="margin:0">Cards</h3>
          <div id="cards" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      const keyName = 'qwik_cardforge_device_key';
      let deviceKey = localStorage.getItem(keyName);
      if (!deviceKey && crypto.randomUUID) { deviceKey = crypto.randomUUID(); localStorage.setItem(keyName, deviceKey); }
      let activePage = '';
      const msg = (t, bad = false) => { const el = document.getElementById('msg'); el.textContent = t; el.style.color = bad ? '#ffb7b7' : '#a1b6de'; };
      async function api(path, opts = {}) {
        const res = await fetch(path, { ...opts, headers: { 'content-type': 'application/json', 'X-Device-Key': deviceKey, ...(opts.headers || {}) } });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }
      async function loadPages() {
        const data = await api('/api/qcf/pages');
        const sel = document.getElementById('pageSelect');
        sel.innerHTML = '';
        for (const p of data.pages || []) {
          const o = document.createElement('option');
          o.value = p.id;
          o.textContent = `${p.title} (${p.slug})`;
          sel.appendChild(o);
        }
        if (!activePage && sel.value) activePage = sel.value;
        if (activePage) sel.value = activePage;
        if (sel.value) { activePage = sel.value; await loadCards(); }
      }
      async function loadCards() {
        if (!activePage) return;
        const data = await api(`/api/qcf/pages/${activePage}`);
        const root = document.getElementById('cards');
        root.innerHTML = '';
        for (const c of data.cards || []) {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `<strong>${c.title || c.type}</strong><div class="muted">${c.body || ''}</div>`;
          const del = document.createElement('button');
          del.className = 'secondary';
          del.textContent = 'Delete';
          del.onclick = async () => { await api(`/api/qcf/cards/${c.id}`, { method: 'DELETE' }); await loadCards(); };
          card.appendChild(del);
          root.appendChild(card);
        }
      }
      document.getElementById('createPage').onclick = async () => {
        try {
          const out = await api('/api/qcf/pages', { method: 'POST', body: JSON.stringify({ title: document.getElementById('pageTitle').value.trim(), slug: document.getElementById('pageSlug').value.trim() }) });
          activePage = out.page.id;
          msg('Page created.');
          await loadPages();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('addCard').onclick = async () => {
        try {
          if (!activePage) throw new Error('create/select page first');
          const ord = Date.now();
          await api(`/api/qcf/pages/${activePage}/cards`, {
            method: 'POST',
            body: JSON.stringify({ type: 'text', ord, title: document.getElementById('cardTitle').value.trim(), body: document.getElementById('cardBody').value })
          });
          msg('Card added.');
          await loadCards();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('pageSelect').onchange = async (e) => { activePage = e.target.value; await loadCards(); };
      document.getElementById('reload').onclick = loadPages;
      loadPages().catch((e) => msg(e.message, true));
    </script>
  </body>
</html>
