<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streamlit</title>
    <style>
      :root { --bg:#0f1220; --card:#1a2038; --txt:#f0f4ff; --m:#aab8de; --a:#7dd9ff; --b:#8d9fff; --bd:#334879; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#20366d 0,#0f1220 58%); }
      .wrap { max-width:1080px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,textarea,button { width:100%; border:1px solid #3f5f98; border-radius:10px; background:#121a33; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#071224; font-weight:700; border:none; cursor:pointer; }
      .m { color:var(--m); font-size:.9rem; }
      .note { border:1px solid #2d4474; border-radius:10px; padding:10px; background:#121a33; margin-top:8px; }
      @media(max-width:960px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Streamlit</h1>
        <p class="m">Notebook-style note workspace with tag filters and search, backed by Neon.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>New Note</h2>
          <input id="title" placeholder="Title" />
          <textarea id="body" rows="10" placeholder="Write your note..."></textarea>
          <input id="tags" placeholder="tags comma-separated" />
          <button id="save">Save Note</button>
        </article>
        <article class="card">
          <h2>Search</h2>
          <input id="q" placeholder="search text" />
          <input id="filterTags" placeholder="required tags comma-separated" />
          <button id="runSearch">Run Search</button>
          <div id="results" class="m"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.streamlitKey || (localStorage.streamlitKey = `streamlit-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');

      function parseTags(v){ return String(v||'').split(',').map(s=>s.trim().toLowerCase()).filter(Boolean); }

      async function health(){
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      function render(items){
        if(!items.length){ resultsEl.innerHTML='<div class="m">No notes.</div>'; return; }
        resultsEl.innerHTML = items.map(n=>`<div class="note"><strong>${n.title}</strong><div class="m">${(n.tags||[]).join(', ')}</div><p>${n.body}</p></div>`).join('');
      }

      async function listNotes(){
        const res = await fetch('/api/streamlit/notes', { headers });
        const data = await res.json().catch(()=>({}));
        render(Array.isArray(data.notes)?data.notes:[]);
      }

      document.getElementById('save').onclick = async () => {
        const payload = {
          title: document.getElementById('title').value.trim(),
          body: document.getElementById('body').value,
          tags: parseTags(document.getElementById('tags').value)
        };
        const res = await fetch('/api/streamlit/notes', { method:'POST', headers, body: JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'Save failed'); return; }
        document.getElementById('title').value='';
        document.getElementById('body').value='';
        document.getElementById('tags').value='';
        await listNotes();
      };

      document.getElementById('runSearch').onclick = async () => {
        const payload = { q: document.getElementById('q').value.trim(), tags: parseTags(document.getElementById('filterTags').value) };
        const res = await fetch('/api/streamlit/query', { method:'POST', headers, body: JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'Search failed'); return; }
        render(Array.isArray(data.results)?data.results:[]);
      };

      health().catch(()=>{ statusEl.textContent='API unavailable.'; });
      listNotes();
    </script>
  </body>
</html>
