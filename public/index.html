<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CapsuleCache</title>
    <style>
      :root{--bg:#0b1020;--card:#151d33;--bd:#2e4068;--txt:#eef3ff;--muted:#9fb0d8;--a:#66e5ff;--b:#8fa2ff}
      *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#243b6a 0,#0b1020 55%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
      .wrap{max-width:1050px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}input,textarea,button{width:100%;background:#111933;color:var(--txt);border:1px solid #3c5894;border-radius:10px;padding:10px}
      button{background:linear-gradient(90deg,var(--a),var(--b));color:#05152d;border:none;font-weight:700;cursor:pointer}.muted{color:var(--muted);font-size:.9rem}.item{border:1px solid #2f4574;border-radius:10px;padding:10px;margin-top:8px;background:#0f1730}
      @media(max-width:960px){.row{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card"><h1>CapsuleCache</h1><p class="muted">Namespaced key-value cache with TTL and cleanup.</p><p id="status" class="muted">Checking API...</p></section>
      <section class="row">
        <article class="card">
          <h2>Write</h2>
          <input id="namespace" placeholder="namespace" value="default" />
          <input id="key" placeholder="key" />
          <input id="ttl" type="number" placeholder="ttl seconds (optional)" />
          <textarea id="value" rows="6" placeholder='JSON value, e.g. {"ok":true}'></textarea>
          <button id="save">Upsert</button>
          <button id="remove">Delete Key</button>
          <button id="cleanup">Cleanup Expired</button>
        </article>
        <article class="card">
          <h2>Read</h2>
          <button id="fetchOne">Fetch Key</button>
          <button id="fetchAll">List Namespace</button>
          <div id="out" class="muted"></div>
        </article>
      </section>
    </main>
    <script>
      const device = localStorage.capsulecacheKey || (localStorage.capsulecacheKey = `capsulecache-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':device};
      const out = document.getElementById('out');
      const status = document.getElementById('status');
      const val = (id)=>document.getElementById(id).value.trim();
      const parseJson = (t)=>{ if(!t) return null; try{return JSON.parse(t);}catch{return t;} };
      const esc=(s)=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
      const render=(data)=>{ out.innerHTML = `<pre>${esc(JSON.stringify(data,null,2))}</pre>`; };

      async function dbHealth(){ const r=await fetch('/api/health/db'); const d=await r.json(); status.textContent = d.ok ? 'API connected to database.' : `API warning: ${d.error || 'unavailable'}`; }

      document.getElementById('save').onclick = async ()=>{
        const ns = val('namespace'); const key = val('key');
        const body = { value: parseJson(document.getElementById('value').value), ttlSeconds: Number(val('ttl')||0) };
        const r = await fetch(`/api/cache/${encodeURIComponent(ns)}/${encodeURIComponent(key)}`, {method:'PUT', headers, body: JSON.stringify(body)});
        render(await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('remove').onclick = async ()=>{
        const ns = val('namespace'); const key = val('key');
        const r = await fetch(`/api/cache/${encodeURIComponent(ns)}/${encodeURIComponent(key)}`, {method:'DELETE', headers});
        render(await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('cleanup').onclick = async ()=>{
        const r = await fetch('/api/admin/cleanup', {method:'POST', headers, body:'{}'});
        render(await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('fetchOne').onclick = async ()=>{
        const ns = val('namespace'); const key = val('key');
        const r = await fetch(`/api/cache/${encodeURIComponent(ns)}/${encodeURIComponent(key)}`, {headers});
        render(await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('fetchAll').onclick = async ()=>{
        const ns = val('namespace');
        const r = await fetch(`/api/cache/${encodeURIComponent(ns)}`, {headers});
        render(await r.json().catch(()=>({error:'bad_response'})));
      };

      dbHealth().catch(()=> status.textContent='API unavailable.');
    </script>
  </body>
</html>
