<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QueJudge</title>
    <style>
      :root { --bg:#0a1324; --panel:#162540; --panel2:#1e2f4f; --text:#e9f1ff; --muted:#9eb3dd; --line:rgba(148,175,225,.26); }
      * { box-sizing: border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1324,#0e1d39); }
      .wrap { max-width:1080px; margin:0 auto; padding:28px 16px 60px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; gap:12px; grid-template-columns:1.25fr .85fr; margin-top:12px; }
      .card { background:var(--panel2); }
      textarea,input,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1a33; color:var(--text); padding:8px 10px; font:inherit; }
      textarea { min-height:230px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
      button { border:0; background:linear-gradient(90deg,#69dcff,#8ea7ff); color:#03182f; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172844; color:#d8e6ff; }
      .row { display:flex; gap:8px; }
      .row > * { flex:1; }
      .list { display:grid; gap:8px; margin-top:10px; max-height:430px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; padding:10px; background:#0c182f; }
      .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre-wrap; }
      #msg { min-height:22px; color:var(--muted); }
      @media (max-width:920px){ .grid{grid-template-columns:1fr;} .row{flex-direction:column;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1 style="margin:0 0 8px">QueJudge</h1>
        <p style="margin:0;color:var(--muted)">Rule-based ranking for task queues with saved runs and reusable rulepacks.</p>
      </section>

      <section class="grid">
        <article class="card">
          <label>Items JSON</label>
          <textarea id="items">[
  {"id":"a","label":"Fix deploy","tags":["ops","urgent"],"due":"2026-03-05","effort":3,"value":9},
  {"id":"b","label":"Refactor docs","tags":["docs"],"effort":4,"value":5},
  {"id":"c","label":"Investigate 500 errors","tags":["urgent","bug"],"effort":2,"value":8}
]</textarea>
          <label>Rules JSON</label>
          <textarea id="rules">{
  "weights": {"tagBoost": 2, "dueSoonBoost": 3, "effortPenalty": 1, "valueBoost": 2, "keywordBoost": 1.5},
  "preferTags": ["urgent", "ops", "bug"],
  "avoidTags": [],
  "preferKeywords": ["fix", "error", "deploy"],
  "avoidKeywords": ["someday"],
  "now": "2026-03-04"
}</textarea>
          <div class="row" style="margin-top:10px">
            <button id="judge">Run Judge</button>
            <button id="savePack" class="secondary">Save Rulepack</button>
            <button id="reload" class="secondary">Reload</button>
          </div>
          <p id="msg"></p>
          <div id="result" class="list"></div>
        </article>

        <article class="card">
          <h3 style="margin:0">History</h3>
          <div id="history" class="list"></div>
          <h3 style="margin:12px 0 0">Rulepacks</h3>
          <div id="packs" class="list"></div>
        </article>
      </section>
    </main>

    <script>
      const keyName = 'quejudge_device_key';
      let userKey = localStorage.getItem(keyName);
      if (!userKey && crypto.randomUUID) {
        userKey = crypto.randomUUID();
        localStorage.setItem(keyName, userKey);
      }

      const msg = (text, bad = false) => {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.style.color = bad ? '#ffb8b8' : '#9eb3dd';
      };

      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: {
            'content-type': 'application/json',
            'x-user-key': userKey,
            ...(opts.headers || {}),
          },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }

      function renderRun(run) {
        const root = document.getElementById('result');
        root.innerHTML = '';
        for (const item of run.ranked || []) {
          const el = document.createElement('div');
          el.className = 'item';
          el.innerHTML = `<strong>${item.label || item.id}</strong><div class="mono">score=${item.score}</div>`;
          root.appendChild(el);
        }
      }

      async function loadHistory() {
        try {
          const data = await api('/api/history?limit=25');
          const root = document.getElementById('history');
          root.innerHTML = '';
          for (const row of data.items || []) {
            const el = document.createElement('button');
            el.className = 'item';
            el.style.textAlign = 'left';
            el.innerHTML = `<strong>${new Date(row.createdAt).toLocaleString()}</strong><div class="mono">items: ${row.itemCount}</div>`;
            el.onclick = async () => {
              try {
                const run = await api(`/api/runs/${row.id}`);
                renderRun(run);
                msg('Loaded run from history.');
              } catch (e) { msg(e.message, true); }
            };
            root.appendChild(el);
          }
        } catch (e) { msg(e.message, true); }
      }

      async function loadRulepacks() {
        try {
          const data = await api('/api/rulepacks');
          const root = document.getElementById('packs');
          root.innerHTML = '';
          for (const pack of data.items || []) {
            const el = document.createElement('button');
            el.className = 'item';
            el.style.textAlign = 'left';
            el.innerHTML = `<strong>${pack.name}</strong><div class="mono">${new Date(pack.createdAt).toLocaleString()}</div>`;
            el.onclick = async () => {
              try {
                const full = await api(`/api/rulepacks/${encodeURIComponent(pack.name)}`);
                document.getElementById('rules').value = JSON.stringify(full.rules || {}, null, 2);
                msg(`Loaded rulepack: ${pack.name}`);
              } catch (e) { msg(e.message, true); }
            };
            root.appendChild(el);
          }
        } catch (e) { msg(e.message, true); }
      }

      document.getElementById('judge').onclick = async () => {
        try {
          const items = JSON.parse(document.getElementById('items').value || '[]');
          const rules = JSON.parse(document.getElementById('rules').value || '{}');
          const run = await api('/api/judge', { method: 'POST', body: JSON.stringify({ items, rules }) });
          renderRun(run);
          msg('Ranking complete and saved.');
          await loadHistory();
        } catch (e) { msg(e.message, true); }
      };

      document.getElementById('savePack').onclick = async () => {
        try {
          const rules = JSON.parse(document.getElementById('rules').value || '{}');
          const name = prompt('Rulepack name', 'default');
          if (!name) return;
          await api('/api/rulepacks', { method: 'POST', body: JSON.stringify({ name, rules }) });
          msg('Rulepack saved.');
          await loadRulepacks();
        } catch (e) { msg(e.message, true); }
      };

      document.getElementById('reload').onclick = async () => {
        await loadHistory();
        await loadRulepacks();
      };

      loadHistory();
      loadRulepacks();
    </script>
  </body>
</html>
