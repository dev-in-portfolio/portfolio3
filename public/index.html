<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HallMap Studio</title>
    <style>
      :root{--bg:#0a1326;--card:#13203c;--bd:#36578e;--txt:#eef4ff;--muted:#a8bbdf;--a:#7df2ff;--b:#90a3ff}*{box-sizing:border-box}
      body{margin:0;background:radial-gradient(circle at 16% 0,#2a4c7a 0,#0a1326 56%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
      .wrap{max-width:1120px;margin:0 auto;padding:24px}.card{border:1px solid var(--bd);border-radius:14px;padding:14px;background:var(--card)}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}input,textarea,button,select{width:100%;padding:10px;border-radius:10px;border:1px solid #3f659e;background:#111d3b;color:var(--txt)}
      button{border:none;background:linear-gradient(90deg,var(--a),var(--b));color:#05152d;font-weight:700;cursor:pointer}.muted{color:var(--muted);font-size:.9rem}.item{border:1px solid #35568e;border-radius:10px;padding:10px;background:#101a34;margin-top:8px}
      @media(max-width:960px){.row{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card"><h1>HallMap Studio</h1><p class="muted">Design museum wings, halls, and exhibits with searchable structure.</p><p id="status" class="muted">Checking API...</p></section>
      <section class="row">
        <article class="card">
          <h2>Structure Builder</h2>
          <input id="wingName" placeholder="Wing name" />
          <button id="addWing">Add Wing</button>
          <select id="wingSelect"></select>
          <input id="hallName" placeholder="Hall name" />
          <button id="addHall">Add Hall</button>
          <select id="hallSelect"></select>
          <input id="title" placeholder="Exhibit title" />
          <input id="summary" placeholder="Summary" />
          <input id="tags" placeholder="tags comma-separated" />
          <textarea id="bodyText" rows="6" placeholder="Exhibit body"></textarea>
          <button id="addExhibit">Add Exhibit</button>
        </article>
        <article class="card">
          <h2>Explorer</h2>
          <input id="query" placeholder="Search exhibits" />
          <input id="tag" placeholder="Filter tag" />
          <button id="search">Search</button>
          <button id="map">Load Map</button>
          <button id="export">Export JSON</button>
          <div id="out" class="muted"></div>
        </article>
      </section>
    </main>
    <script>
      const status=document.getElementById('status');
      const out=document.getElementById('out');
      const wingSelect=document.getElementById('wingSelect');
      const hallSelect=document.getElementById('hallSelect');
      const esc=(s)=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
      const show=(d)=>{ out.innerHTML=`<pre>${esc(JSON.stringify(d,null,2))}</pre>`; };
      const val=(id)=>document.getElementById(id).value.trim();
      const tags=(s)=>String(s||'').split(',').map(v=>v.trim().toLowerCase()).filter(Boolean);

      async function health(){ const r=await fetch('/api/health/db'); const d=await r.json(); status.textContent=d.ok?'API connected to database.':`API warning: ${d.error||'unavailable'}`; }
      async function wings(){ const r=await fetch('/api/hallmap/wings'); const d=await r.json(); wingSelect.innerHTML=(d.wings||[]).map(w=>`<option value="${w.id}">${w.name}</option>`).join(''); return d.wings||[]; }
      async function halls(){ const wingId=wingSelect.value; const r=await fetch(`/api/hallmap/halls?wingId=${encodeURIComponent(wingId)}`); const d=await r.json(); hallSelect.innerHTML=(d.halls||[]).map(h=>`<option value="${h.id}">${h.name}</option>`).join(''); return d.halls||[]; }

      document.getElementById('addWing').onclick=async()=>{ const r=await fetch('/api/hallmap/wings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:val('wingName')})}); show(await r.json().catch(()=>({error:'bad_response'}))); await wings(); await halls(); };
      wingSelect.onchange=()=>halls();
      document.getElementById('addHall').onclick=async()=>{ const r=await fetch('/api/hallmap/halls',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wingId:wingSelect.value,name:val('hallName')})}); show(await r.json().catch(()=>({error:'bad_response'}))); await halls(); };
      document.getElementById('addExhibit').onclick=async()=>{ const body={hallId:hallSelect.value,title:val('title'),summary:val('summary'),tags:tags(val('tags')),body:val('bodyText')}; const r=await fetch('/api/hallmap/exhibits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); show(await r.json().catch(()=>({error:'bad_response'}))); };
      document.getElementById('search').onclick=async()=>{ const r=await fetch(`/api/hallmap/exhibits?q=${encodeURIComponent(val('query'))}&tag=${encodeURIComponent(val('tag'))}`); show(await r.json().catch(()=>({error:'bad_response'}))); };
      document.getElementById('map').onclick=async()=>{ const r=await fetch('/api/hallmap/map'); show(await r.json().catch(()=>({error:'bad_response'}))); };
      document.getElementById('export').onclick=async()=>{ const r=await fetch('/api/hallmap/export'); const txt=await r.text(); const blob=new Blob([txt],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hallmap_export.json'; a.click(); };

      health().catch(()=>status.textContent='API unavailable.');
      wings().then(()=>halls());
    </script>
  </body>
</html>
