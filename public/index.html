<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dash ClaimScope</title>
    <style>
      :root { --bg:#101018; --card:#1b1a27; --txt:#f2efff; --m:#b9b2d1; --a:#ffb07f; --b:#ff7ea2; --bd:#5a4779; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 16% 0,#4a315f 0,#101018 58%); }
      .wrap { max-width:1100px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,select,textarea,button { width:100%; border:1px solid #735995; border-radius:10px; background:#1a1429; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#2b1322; font-weight:700; border:none; cursor:pointer; }
      .m { color:var(--m); font-size:.9rem; }
      table { width:100%; border-collapse: collapse; }
      th,td { border-bottom:1px solid #5a4779; text-align:left; padding:6px; }
      @media(max-width:960px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Dash ClaimScope</h1>
        <p class="m">Benefit model builder + payout simulation for scenario planning.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>Model Builder</h2>
          <input id="modelName" placeholder="Model name" />
          <textarea id="modelNotes" rows="3" placeholder="Notes"></textarea>
          <button id="createModel">Create Model</button>
          <label class="m">Model</label>
          <select id="modelSelect"></select>
          <h3>Add Benefit Line</h3>
          <input id="lineType" placeholder="e.g. ER / HOSP_DAY / ICU_DAY" />
          <input id="lineAmount" type="number" placeholder="Amount" value="250" />
          <input id="lineUnit" placeholder="per_visit / per_day / per_event" value="per_visit" />
          <input id="lineMax" type="number" value="2" />
          <input id="lineWait" type="number" value="0" />
          <button id="addLine">Add Line</button>
          <div id="lines" class="m"></div>
        </article>
        <article class="card">
          <h2>Scenario Simulator</h2>
          <input id="scenarioName" placeholder="Scenario name" />
          <textarea id="scenarioJson" rows="10">{"er_visits":2,"hospital_days":4,"icu_days":1,"surgery_events":1,"outpatient_visits":3,"ambulance_events":0,"imaging_events":2,"estimated_bills":14500}</textarea>
          <button id="saveScenario">Save Scenario</button>
          <button id="runSim">Run Simulation</button>
          <div id="simOut" class="m"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.dashClaimscopeKey || (localStorage.dashClaimscopeKey = `dash-claimscope-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const modelSelect = document.getElementById('modelSelect');

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function loadModels() {
        const res = await fetch('/api/claimscope/models', { headers });
        const data = await res.json();
        const models = Array.isArray(data.models) ? data.models : [];
        modelSelect.innerHTML = models.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        if (models[0]) await loadLines(models[0].id);
      }

      async function loadLines(modelId) {
        const res = await fetch(`/api/claimscope/models/${modelId}/lines`, { headers });
        const data = await res.json();
        const lines = Array.isArray(data.lines) ? data.lines : [];
        if (!lines.length) { document.getElementById('lines').innerHTML = 'No benefit lines yet.'; return; }
        document.getElementById('lines').innerHTML = `<table><thead><tr><th>type</th><th>amount</th><th>unit</th><th>max</th><th>wait</th></tr></thead><tbody>${lines.map(l=>`<tr><td>${l.benefit_type}</td><td>${l.amount}</td><td>${l.unit}</td><td>${l.max_units}</td><td>${l.waiting_days}</td></tr>`).join('')}</tbody></table>`;
      }

      document.getElementById('createModel').onclick = async () => {
        const payload = { name: document.getElementById('modelName').value.trim(), notes: document.getElementById('modelNotes').value.trim() };
        const res = await fetch('/api/claimscope/models', { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) { alert(data.error || data.detail || 'Create model failed'); return; }
        await loadModels();
      };

      document.getElementById('addLine').onclick = async () => {
        const modelId = modelSelect.value;
        if (!modelId) return alert('Create/select a model first.');
        const payload = {
          benefit_type: document.getElementById('lineType').value.trim(),
          amount: Number(document.getElementById('lineAmount').value || 0),
          unit: document.getElementById('lineUnit').value.trim(),
          max_units: Number(document.getElementById('lineMax').value || 0),
          waiting_days: Number(document.getElementById('lineWait').value || 0),
          is_enabled: true
        };
        const res = await fetch(`/api/claimscope/models/${modelId}/lines`, { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) { alert(data.error || data.detail || 'Add line failed'); return; }
        await loadLines(modelId);
      };

      document.getElementById('saveScenario').onclick = async () => {
        const modelId = modelSelect.value;
        if (!modelId) return alert('Create/select a model first.');
        let inputs;
        try { inputs = JSON.parse(document.getElementById('scenarioJson').value); }
        catch { return alert('Scenario JSON invalid'); }
        const payload = { name: document.getElementById('scenarioName').value.trim() || `scenario-${Date.now()}`, inputs };
        const res = await fetch(`/api/claimscope/models/${modelId}/scenarios`, { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) { alert(data.error || data.detail || 'Save scenario failed'); }
      };

      document.getElementById('runSim').onclick = async () => {
        const modelId = modelSelect.value;
        if (!modelId) return alert('Create/select a model first.');
        let scenario;
        try { scenario = JSON.parse(document.getElementById('scenarioJson').value); }
        catch { return alert('Scenario JSON invalid'); }
        const res = await fetch(`/api/claimscope/models/${modelId}/simulate`, { method:'POST', headers, body:JSON.stringify({ scenario }) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) { alert(data.error || data.detail || 'Simulation failed'); return; }
        const s = data.summary || {};
        const b = Array.isArray(data.breakdown) ? data.breakdown : [];
        document.getElementById('simOut').innerHTML = `
          <p>Total payout: $${s.total_payout ?? 0}</p>
          <p>Estimated bills: $${s.estimated_bills ?? 0}</p>
          <p>Payout gap: $${s.payout_gap ?? 0}</p>
          <table><thead><tr><th>type</th><th>eligible</th><th>paid</th><th>amount</th><th>payout</th></tr></thead><tbody>
          ${b.map(r=>`<tr><td>${r.benefit_type}</td><td>${r.eligible_units}</td><td>${r.paid_units}</td><td>${r.amount}</td><td>${r.payout}</td></tr>`).join('')}
          </tbody></table>`;
      };

      modelSelect.onchange = () => loadLines(modelSelect.value);

      health().catch(()=>{ statusEl.textContent='API unavailable.'; });
      loadModels();
    </script>
  </body>
</html>
