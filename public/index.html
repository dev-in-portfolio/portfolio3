<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snapshot Vault</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      *{box-sizing:border-box;} body{margin:0;font-family:"Space Grotesk",system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a1222,#0f1c38);}
      .wrap{max-width:1120px;margin:0 auto;padding:28px 16px 58px;} .hero,.card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:14px;}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;} .card{background:var(--panel2);}
      label{display:block;margin:8px 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
      input,textarea,select,button{width:100%;border-radius:10px;border:1px solid var(--line);background:#0d1931;color:var(--text);padding:8px 10px;font:inherit;}
      textarea{min-height:110px;resize:vertical;} .row{display:flex;gap:8px;} .row>*{flex:1;}
      button{border:0;background:linear-gradient(90deg,#70dcff,#90abff);color:#03152b;font-weight:700;cursor:pointer;} button.secondary{border:1px solid var(--line);background:#172744;color:#dbe9ff;}
      .list{display:grid;gap:8px;margin-top:8px;max-height:430px;overflow:auto;} .item{border:1px solid var(--line);border-radius:10px;background:#0d1830;padding:10px;} .muted{color:var(--muted);}
      @media (max-width:900px){.grid{grid-template-columns:1fr;}.row{flex-direction:column;}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero"><h1 style="margin:0 0 8px">Snapshot Vault</h1><p class="muted" style="margin:0">Versioned snapshots for live drafting and change tracking.</p></section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Documents</h3>
          <label>Document title</label><input id="docTitle" placeholder="Weekly update" />
          <div class="row" style="margin-top:8px"><button id="createDoc">Create Document</button><button id="reload" class="secondary">Reload</button></div>
          <label>Active document</label><select id="docSelect"></select>
          <label>Summary</label><input id="summary" placeholder="Refined intro and added metrics." />
          <label>Body</label><textarea id="body">Write draft text here...</textarea>
          <button id="saveSnap" style="margin-top:8px">Save Snapshot</button>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card"><h3 style="margin:0">Snapshots</h3><div id="snaps" class="list"></div></article>
      </section>
    </main>
    <script>
      const keyName='snapshot_vault_device_key'; let deviceKey=localStorage.getItem(keyName); if(!deviceKey&&crypto.randomUUID){deviceKey=crypto.randomUUID();localStorage.setItem(keyName,deviceKey);}
      let activeDoc=''; const msg=(t,b=false)=>{const el=document.getElementById('msg');el.textContent=t;el.style.color=b?'#ffb7b7':'#a1b6de';};
      async function api(path,opts={}){const res=await fetch(path,{...opts,headers:{'content-type':'application/json','X-Device-Key':deviceKey,...(opts.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.detail||data.error||`http_${res.status}`);return data;}
      async function loadDocs(){const data=await api('/api/snapshotvault/documents');const sel=document.getElementById('docSelect');sel.innerHTML='';for(const d of data.documents||[]){const o=document.createElement('option');o.value=d.id;o.textContent=d.title;sel.appendChild(o);}if(!activeDoc&&sel.value)activeDoc=sel.value;if(activeDoc)sel.value=activeDoc;if(sel.value){activeDoc=sel.value;await loadSnaps();}}
      async function loadSnaps(){if(!activeDoc)return;const data=await api(`/api/snapshotvault/documents/${activeDoc}/snapshots`);const root=document.getElementById('snaps');root.innerHTML='';for(const s of data.snapshots||[]){const c=document.createElement('div');c.className='item';c.innerHTML=`<strong>v${s.version}</strong><div class="muted">${new Date(s.created_at).toLocaleString()}</div><div>${s.summary||''}</div><div class="muted">+${s.diff_added} / -${s.diff_removed}</div>`;root.appendChild(c);}}
      document.getElementById('createDoc').onclick=async()=>{try{const out=await api('/api/snapshotvault/documents',{method:'POST',body:JSON.stringify({title:document.getElementById('docTitle').value.trim()})});activeDoc=out.document.id;msg('Document created.');await loadDocs();}catch(e){msg(e.message,true);}};
      document.getElementById('saveSnap').onclick=async()=>{try{if(!activeDoc)throw new Error('create/select document first');await api(`/api/snapshotvault/documents/${activeDoc}/snapshots`,{method:'POST',body:JSON.stringify({summary:document.getElementById('summary').value.trim(),body:document.getElementById('body').value})});msg('Snapshot saved.');await loadSnaps();}catch(e){msg(e.message,true);}};
      document.getElementById('docSelect').onchange=async(e)=>{activeDoc=e.target.value;await loadSnaps();};
      document.getElementById('reload').onclick=loadDocs;
      loadDocs().catch(e=>msg(e.message,true));
    </script>
  </body>
</html>
