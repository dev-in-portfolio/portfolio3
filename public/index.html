<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pocket Dossier</title>
    <style>
      :root { --bg:#0d0f1d; --card:#151b2e; --txt:#edf1ff; --m:#9ba7cc; --a:#88f3b3; --b:#6bb6ff; --bd:#2f3e6d; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; background:radial-gradient(circle at 10% 0,#1d2748 0,#0d0f1d 60%); color:var(--txt); }
      .wrap { max-width:1000px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      input,textarea,button { width:100%; border-radius:10px; border:1px solid #385395; background:#0f162a; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#041124; border:none; font-weight:700; cursor:pointer; }
      ul { list-style:none; padding:0; margin:0; display:grid; gap:8px; }
      li { border:1px solid #2f467c; border-radius:10px; padding:10px; background:#0f162a; }
      .m { color:var(--m); font-size:.9rem; }
      @media(max-width:900px){ .grid{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Pocket Dossier</h1>
        <p class="m">Capture timeline notes with tags. API routes are live on Netlify Functions + Neon.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="grid" style="margin-top:12px;">
        <article class="card">
          <h2>New Entry</h2>
          <input id="title" placeholder="Title" />
          <textarea id="body" rows="7" placeholder="What happened?"></textarea>
          <input id="tags" placeholder="tags (comma separated)" />
          <button id="save">Save Entry</button>
        </article>
        <article class="card">
          <h2>Entries</h2>
          <ul id="entries"></ul>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.pocketDossierKey || (localStorage.pocketDossierKey = `pocket-dossier-${crypto.randomUUID()}`);
      const headers = { 'Content-Type': 'application/json', 'X-Device-Key': key };
      const statusEl = document.getElementById('status');
      const entriesEl = document.getElementById('entries');

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function loadEntries() {
        const res = await fetch('/api/dossier/entries', { headers });
        const rows = await res.json();
        entriesEl.innerHTML = '';
        if (!Array.isArray(rows) || !rows.length) {
          entriesEl.innerHTML = '<li class="m">No entries yet.</li>';
          return;
        }
        rows.forEach((row) => {
          const li = document.createElement('li');
          const tags = Array.isArray(row.tags) ? row.tags.join(', ') : '';
          li.innerHTML = `<strong>${row.title || 'Untitled'}</strong><div class="m">${new Date(row.occurred_at).toLocaleString()}</div><p>${row.body}</p><div class="m">${tags}</div>`;
          const del = document.createElement('button');
          del.textContent = 'Delete';
          del.style.marginTop = '8px';
          del.onclick = async () => { await fetch(`/api/dossier/entries/${row.id}`, { method: 'DELETE', headers }); await loadEntries(); };
          li.appendChild(del);
          entriesEl.appendChild(li);
        });
      }

      document.getElementById('save').onclick = async () => {
        const title = document.getElementById('title').value.trim();
        const body = document.getElementById('body').value.trim();
        const tags = document.getElementById('tags').value.split(',').map(s => s.trim()).filter(Boolean);
        const res = await fetch('/api/dossier/entries', {
          method: 'POST',
          headers,
          body: JSON.stringify({ title, body, tags })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'Failed to save entry.');
          return;
        }
        document.getElementById('title').value = '';
        document.getElementById('body').value = '';
        document.getElementById('tags').value = '';
        await loadEntries();
      };

      health().catch(() => { statusEl.textContent = 'API unavailable.'; });
      loadEntries().catch(() => { entriesEl.innerHTML = '<li class="m">Failed to load entries.</li>'; });
    </script>
  </body>
</html>
