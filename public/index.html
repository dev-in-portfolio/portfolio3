<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FormFoundry</title>
    <meta
      name="description"
      content="FormFoundry turns schema-driven forms into a polished operator workspace with live preview, publishing, and response review."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Operator-grade Form Design</p>
          <h1>FormFoundry</h1>
          <p class="hero-text">
            Build production-ready forms with a command deck, a live schema studio,
            and a public experience that feels intentionally designed rather than
            generated.
          </p>
        </div>
        <div class="hero-side">
          <div class="hero-chip">Schema-driven publishing</div>
          <div class="hero-chip hero-chip-alt">Inbox-ready responses</div>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
