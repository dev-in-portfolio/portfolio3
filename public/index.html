<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gatekeeper</title>
    <style>
      :root{--bg:#0c1022;--card:#151c36;--bd:#304676;--txt:#eef3ff;--muted:#a6b6db;--a:#79f6ce;--b:#7fa0ff}*{box-sizing:border-box}
      body{margin:0;background:radial-gradient(circle at 15% 0,#1f4360 0,#0c1022 56%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
      .wrap{max-width:1080px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}input,textarea,select,button{width:100%;background:#12193a;color:var(--txt);border:1px solid #3c5f9a;border-radius:10px;padding:10px}
      button{background:linear-gradient(90deg,var(--a),var(--b));color:#061828;border:none;font-weight:700;cursor:pointer}.muted{color:var(--muted);font-size:.9rem}.item{border:1px solid #304978;border-radius:10px;background:#111735;padding:10px;margin-top:8px}
      @media(max-width:960px){.row{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card"><h1>Gatekeeper</h1><p class="muted">Manage API keys and evaluate request allow/block outcomes.</p><p id="status" class="muted">Checking API...</p></section>
      <section class="row">
        <article class="card">
          <h2>Keys</h2>
          <input id="label" placeholder="key label" />
          <input id="token" placeholder="raw token" />
          <button id="createKey">Create Key</button>
          <button id="loadKeys">Refresh Keys</button>
          <div id="keys" class="muted"></div>
        </article>
        <article class="card">
          <h2>Simulate Request</h2>
          <input id="route" value="/v1/orders" />
          <select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
          <input id="apiKey" placeholder="api key token" />
          <textarea id="payload" rows="6" placeholder='JSON payload (optional)'></textarea>
          <button id="simulate">Simulate</button>
          <button id="logs">Load Logs</button>
          <div id="out" class="muted"></div>
        </article>
      </section>
    </main>
    <script>
      const device = localStorage.gatekeeperKey || (localStorage.gatekeeperKey = `gatekeeper-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':device};
      const status = document.getElementById('status');
      const out = document.getElementById('out');
      const keysBox = document.getElementById('keys');
      const esc=(s)=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
      const val=(id)=>document.getElementById(id).value.trim();
      const parsePayload=()=>{ const raw=document.getElementById('payload').value.trim(); if(!raw) return {}; try{return JSON.parse(raw);}catch{return {raw};} };
      const show=(el,data)=>{ el.innerHTML=`<pre>${esc(JSON.stringify(data,null,2))}</pre>`; };

      async function health(){ const r=await fetch('/api/health/db'); const d=await r.json(); status.textContent=d.ok?'API connected to database.':`API warning: ${d.error||'unavailable'}`; }

      async function loadKeys(){
        const r=await fetch('/api/admin/keys',{headers});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){ show(keysBox,d); return; }
        keysBox.innerHTML=(d.keys||[]).map(k=>`<div class='item'><strong>${esc(k.label)}</strong><div class='muted'>${k.id}</div><button data-id='${k.id}'>Delete</button></div>`).join('')||'<div class="muted">No keys yet.</div>';
        keysBox.querySelectorAll('button[data-id]').forEach(btn=>btn.onclick=async()=>{ await fetch(`/api/admin/keys/${btn.dataset.id}`,{method:'DELETE',headers}); loadKeys(); });
      }

      document.getElementById('createKey').onclick = async ()=>{
        const body={label:val('label'),token:val('token')};
        const r=await fetch('/api/admin/keys',{method:'POST',headers,body:JSON.stringify(body)});
        show(out, await r.json().catch(()=>({error:'bad_response'})));
        loadKeys();
      };
      document.getElementById('loadKeys').onclick=loadKeys;
      document.getElementById('simulate').onclick=async()=>{
        const body={route:val('route'),method:val('method'),apiKey:val('apiKey'),payload:parsePayload()};
        const r=await fetch('/api/proxy/simulate',{method:'POST',headers,body:JSON.stringify(body)});
        show(out, await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('logs').onclick=async()=>{
        const r=await fetch('/api/proxy/logs',{headers});
        show(out, await r.json().catch(()=>({error:'bad_response'})));
      };

      health().catch(()=>status.textContent='API unavailable.');
      loadKeys();
    </script>
  </body>
</html>
