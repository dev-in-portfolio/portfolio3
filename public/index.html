<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LineFlow</title>
    <style>
      :root {
        --bg: #0a1222;
        --panel: #141f34;
        --panel2: #1b2944;
        --text: #e7efff;
        --muted: #9eb2db;
        --line: rgba(147, 174, 224, 0.28);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 0%, rgba(105, 217, 255, 0.16), transparent 35%),
          linear-gradient(180deg, #0a1222, #0d1830 70%);
      }
      .wrap { max-width: 1050px; margin: 0 auto; padding: 30px 18px 72px; }
      .hero, .card { border: 1px solid var(--line); border-radius: 14px; background: var(--panel); padding: 14px; }
      .hero { margin-bottom: 14px; }
      .card { background: var(--panel2); }
      .muted { color: var(--muted); }
      .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
      label { display:block; font-size:12px; color: var(--muted); margin:8px 0 6px; text-transform: uppercase; letter-spacing: .06em; }
      input, button {
        width: 100%;
        min-height: 38px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #0e1931;
        color: var(--text);
        padding: 8px 10px;
        font: inherit;
      }
      button { cursor: pointer; border: 0; background: linear-gradient(90deg,#66deff,#8ca6ff); color:#031225; font-weight: 700; }
      button.secondary { border:1px solid var(--line); background:#14223f; color:#d9e7ff; }
      .row { display:flex; gap:8px; align-items:center; }
      .row > * { flex:1; }
      .list { display:grid; gap:8px; margin-top:8px; }
      .item { border:1px solid var(--line); border-radius:10px; padding:10px; background:#0d182f; }
      #msg { min-height: 22px; margin-top:10px; }
      @media (max-width: 700px){ .row { flex-direction: column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1 style="margin:0 0 8px">LineFlow</h1>
        <p class="muted" style="margin:0">Sequence timers with reusable presets and active session tracking.</p>
      </section>

      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Presets</h3>
          <label>Name</label>
          <input id="presetName" placeholder="Pasta 8m" />
          <label>Duration (seconds)</label>
          <input id="presetSeconds" type="number" min="1" value="480" />
          <label>Color</label>
          <input id="presetColor" value="#66deff" />
          <div class="row" style="margin-top:10px">
            <button id="savePreset">Save</button>
            <button id="refreshPresets" class="secondary">Refresh</button>
          </div>
          <div id="presetList" class="list"></div>
        </article>

        <article class="card">
          <h3 style="margin:0">Timer Sessions</h3>
          <label>Label</label>
          <input id="sessionLabel" placeholder="Line check" />
          <label>Duration (seconds)</label>
          <input id="sessionSeconds" type="number" min="1" value="180" />
          <div class="row" style="margin-top:10px">
            <button id="createSession">Start</button>
            <button id="refreshSessions" class="secondary">Refresh</button>
          </div>
          <div id="sessionList" class="list"></div>
        </article>
      </section>
      <p id="msg" class="muted"></p>
    </main>
    <script>
      const keyName = "lineflow_device_key";
      let deviceKey = localStorage.getItem(keyName);
      if (!deviceKey && crypto.randomUUID) {
        deviceKey = crypto.randomUUID();
        localStorage.setItem(keyName, deviceKey);
      }
      const msg = (text, bad=false) => {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.style.color = bad ? "#ffb7b7" : "#9eb2db";
      };
      async function api(path, opts={}) {
        const res = await fetch(path, {
          ...opts,
          headers: {
            "content-type": "application/json",
            "X-Device-Key": deviceKey,
            ...(opts.headers || {})
          }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `http_${res.status}`);
        return data;
      }
      async function loadPresets() {
        try {
          const data = await api("/api/timers/presets");
          const root = document.getElementById("presetList");
          root.innerHTML = "";
          for (const p of data.presets || []) {
            const item = document.createElement("div");
            item.className = "item";
            item.innerHTML = `<strong>${p.name}</strong><div class="muted">${p.duration_seconds}s • ${p.color}</div>`;
            root.appendChild(item);
          }
        } catch (e) { msg(e.message, true); }
      }
      async function loadSessions() {
        try {
          const data = await api("/api/timers/sessions?limit=30");
          const root = document.getElementById("sessionList");
          root.innerHTML = "";
          for (const s of data.sessions || []) {
            const item = document.createElement("div");
            item.className = "item";
            item.innerHTML = `<strong>${s.label || "Untitled"}</strong><div class="muted">${s.duration_seconds}s • ${s.status}</div>`;
            root.appendChild(item);
          }
        } catch (e) { msg(e.message, true); }
      }
      document.getElementById("savePreset").onclick = async () => {
        try {
          await api("/api/timers/presets", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("presetName").value.trim(),
              durationSeconds: Number(document.getElementById("presetSeconds").value),
              color: document.getElementById("presetColor").value.trim()
            })
          });
          document.getElementById("presetName").value = "";
          await loadPresets();
          msg("Preset saved.");
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById("createSession").onclick = async () => {
        try {
          await api("/api/timers/sessions", {
            method: "POST",
            body: JSON.stringify({
              label: document.getElementById("sessionLabel").value.trim(),
              durationSeconds: Number(document.getElementById("sessionSeconds").value)
            })
          });
          document.getElementById("sessionLabel").value = "";
          await loadSessions();
          msg("Session started.");
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById("refreshPresets").onclick = loadPresets;
      document.getElementById("refreshSessions").onclick = loadSessions;
      loadPresets();
      loadSessions();
    </script>
  </body>
</html>
