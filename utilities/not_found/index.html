/* ===== Phase 4: Accessibility, Contrast, & Perception ===== */
/* Kill default shiny-blue links globally (unless explicitly styled) */
a:link, a:visited{
  color: rgba(255,255,255,0.92);
  text-decoration-color: rgba(255,255,255,0.35);
}
a:hover{
  color: rgba(255,255,255,0.98);
  text-decoration-color: rgba(155,209,255,0.70);
}
a:active{
  color: rgba(255,255,255,1);
}

/* If something is intended to look like a button, it should feel like one */
a.btn, a.buttonlike, .nxs-btn, .nxs-pill, .pillBtn, button, [role="button"]{
  text-decoration: none !important;
}

/* Keyboard: always visible focus, never the default outline that disappears on dark backgrounds */
:focus-visible{
  outline: 2px solid rgba(155,209,255,0.85);
  outline-offset: 4px;
}

/* Increase tap target comfort on mobile */
a, button{
  -webkit-tap-highlight-color: rgba(155,209,255,0.25);
}


/* ===== Phase 5: Performance, SEO, & Production Paranoia ===== */
/* Reduce layout shift from images */
img{ height:auto; }

<script>
(function(){
  // Load shared/loader.js without assuming site root (works on file:// and subpaths)
  var tries=[
    'shared/loader.js','../shared/loader.js','../../shared/loader.js','../../../shared/loader.js','../../../../shared/loader.js'
  ];
  function load(i){
    if(i>=tries.length){console.error('Failed to load shared/loader.js');return;}
    var s=document.createElement('script');
    s.src=tries[i];
    s.onload=function(){};
    s.onerror=function(){load(i+1);};
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
<script>
(function(){
  const tries=[
    'shared/loader.js','../shared/loader.js','../../shared/loader.js','../../../shared/loader.js','../../../../shared/loader.js'
  ];
  function loadNext(i){
    if(i>=tries.length){
      const pre=document.createElement('pre');
      pre.style.whiteSpace='pre-wrap';
      pre.textContent='FATAL: could not load shared/loader.js from any relative path.';
      document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(pre));
      return;
    }
    const s=document.createElement('script');
    s.src=tries[i];
    s.onload=()=>{window.__TREE_LOADER_BOOTSTRAPPED__=true;};
    s.onerror=()=>loadNext(i+1);
    document.head.appendChild(s);
  }
  loadNext(0);
})();
</script>
<script>
(function(){
  const candidates = [
    './shared/loader.js','../shared/loader.js','../../shared/loader.js','../../../shared/loader.js','../../../../shared/loader.js'
  ];
  for (const src of candidates){
    const s=document.createElement('script');
    s.src=src;
    s.async=false;
    s.onload=()=>{window.__TREE_LOADER_OK__=true;};
    s.onerror=()=>{};
    document.head.appendChild(s);
    // stop after first attempt; browser will try to load; if 404, next scripts still run but harmless
  }
})();
</script>

<h1 style="margin:14px 0 6px">404 Index</h1>
<p style="margin:0 0 14px;opacity:.9">Direct links for each app (/404).</p>
<ul id="list"></ul>
<div class="small">Registry: <code>/config/registry.json</code></div>
</div>
<script>
(async function(){
  const ul=document.getElementById("list");
  function esc(s){return (s??"").toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  try{
    const res=await fetch("/config/registry.json",{cache:"no-store"});
    const reg=await res.json();
    const apps=reg.apps||{};
    const keys=Object.keys(apps).sort();
    ul.innerHTML = keys.map(k=>{
      const a=apps[k]||{};
      const href = a["not_found"] || "/404/"+k+"/";
      return `<li><a href="${esc(href)}">${esc(k)}</a></li>`;
    }).join("");
  }catch(e){
    ul.innerHTML = `<li>Registry load failed: ${esc(e.message||String(e))}</li>`;
  }
})();
</script>
<script>
/* APP_404_REDIRECT */
(function(){
  const params=new URLSearchParams(location.search);
  const app=(params.get('app')||'').toLowerCase();
  if(!app) return;
  const target='/404/'+encodeURIComponent(app)+'/';
  // try fetch to see if exists then redirect
  fetch(target,{method:'GET'}).then(r=>{ if(r.ok) location.replace(target); }).catch(()=>{});
})();
