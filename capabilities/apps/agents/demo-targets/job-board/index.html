<div class="hcard">
<h1>Demo Job Board</h1>
<p>Safe target for automation.</p>
<div class="kv"><span class="tag ok">demo</span><span class="tag">selectors stable</span></div>
<div class="sep"></div>
<input id="q" placeholder="Search" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff"/>
<ul id="list"></ul>
</div>
<script>
const jobs=["UI Systems Engineer","Product Engineer","Front-End Engineer","Automation Engineer"];
const list=document.getElementById("list");
const q=document.getElementById("q");
function render(){
  const v=q.value.toLowerCase();
  list.innerHTML = jobs.filter(j=>j.toLowerCase().includes(v)).map(j=>`<li style="margin:10px 0;padding:10px;border:1px solid rgba(255,255,255,.10);border-radius:12px">${j}</li>`).join("");
}
q.addEventListener("input", render); render();
</script>
<div class="footer">AgentX demo module • local runner + packs + receipts • v0.3.0</div>
</div>
