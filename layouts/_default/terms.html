{{ define "main" }}
<section class="section">
  <h2>{{ .Title }}</h2>
  {{ if gt (len .Data.Terms) 0 }}
  <div class="cards">
    {{ range .Data.Terms.Alphabetical }}
    <article class="card">
      <h3><a href="{{ .Page.RelPermalink }}">{{ .Page.LinkTitle }}</a></h3>
      <p>{{ .Count }} entry{{ if ne .Count 1 }}ies{{ end }}</p>
    </article>
    {{ end }}
  </div>
  {{ else }}
  <p>No terms are available yet.</p>
  {{ end }}
</section>
{{ end }}
