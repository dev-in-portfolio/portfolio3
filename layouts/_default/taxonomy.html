{{ define "main" }}
<section class="section">
  <h2>{{ .Title }}</h2>
  <div class="cards">
    {{ range .Pages.ByTitle }}
    <article class="card">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      <p>Last verified: {{ .Params.last_verified }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
