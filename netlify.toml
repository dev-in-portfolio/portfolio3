[build]
  command = ""
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  FRAMEWORK = "express"

[functions]
  directory = "functions"
  node_bundler = "esbuild"
  external_node_modules = ["ejs"]
  included_files = [
    "public/**",
    "src/views/**",
    "node_modules/ejs/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true
