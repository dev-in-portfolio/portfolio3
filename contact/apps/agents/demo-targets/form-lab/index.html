<div class="container">
<div class="hcard">
<h1>Demo Form Lab</h1>
<p>Autofill-safe form. Submit is local-only and does nothing dangerous.</p>
<form id="f" style="display:grid;gap:10px;max-width:560px">
<label>Name <input name="name" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff"/></label>
<label>Email <input name="email" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff"/></label>
<button style="padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(125,249,255,.12);color:#fff" type="submit">Submit</button>
<div class="tag ok" id="ok" style="display:none">Submitted (demo)</div>
</form>
</div>
<script>
document.getElementById("f").addEventListener("submit",(e)=>{
  e.preventDefault();
  document.getElementById("ok").style.display="inline-block";
});
</script>
<div class="footer">AgentX demo module • local runner + packs + receipts • v0.3.0</div>
</div>
