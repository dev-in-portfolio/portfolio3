<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToonStudio Pro | AI Animation Engine</title>

  <!-- Nexus Top Nav -->
  <link rel="stylesheet" href="../../shared/nexus-topnav.css" />
  <link rel="stylesheet" href="../../shared/nexus-topnav-v2.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
      @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;800&display=swap');
      
      :root {
        --brand-indigo: #6366f1;
        --brand-purple: #a855f7;
        --bg-deep: #020617;
        --glass-bg: rgba(15, 23, 42, 0.75);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-deep);
        color: #f8fafc;
        overflow-x: hidden;
      }

      .font-bungee { font-family: 'Bungee', cursive; }
      .font-outfit { font-family: 'Outfit', sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

      /* Glassmorphism */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }

      .glass-thick {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      /* Transitions & Animations */
      .page-transition {
        animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Neon Pulse */
      .neon-border {
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        border-color: rgba(99, 102, 241, 0.3);
      }
      
      .active-step-glow {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
      }

      /* Video aspect ratio container */
      .video-aspect {
        aspect-ratio: 16 / 9;
      }

      /* Gradient Text */
      .text-gradient {
        background: linear-gradient(to right, #fff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
</head>
<body class="nx-has-topnav">
  <nav class="nxTopNav"></nav>

  <div id="app"></div>

  <script src="../../shared/nexus-topnav-v2.js?v=toon" defer></script>
  <script src="./toonstudio.js" defer></script>
</body>
</html>
