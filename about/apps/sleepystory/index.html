<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SleepyStory Studio | Magic Bedtime Adventures</title>

  <!-- Nexus Top Nav -->
  <link rel="stylesheet" href="../../shared/nexus-topnav.css" />
  <link rel="stylesheet" href="../../shared/nexus-topnav-v2.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --studio-dark: #0f172a;
        --studio-accent: #6366f1;
        --book-bg: #fffcf5;
        --page-shadow: rgba(0,0,0,0.1);
      }
      
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #f8fafc;
        background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
        background-size: 40px 40px;
        overflow-x: hidden;
        cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="%236366f1"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6.4-4.8-6.4 4.8 2.4-7.2-6-4.8h7.6z"/></svg>'), auto;
      }

      .font-magic {
        font-family: 'Fredoka One', cursive;
      }
      
      .paper-texture {
        position: relative;
        background-color: var(--book-bg);
      }
      
      .paper-texture::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.05;
        pointer-events: none;
        background-image: url('https://www.transparenttextures.com/patterns/p6.png');
      }

      .perspective-container {
        perspective: 3500px;
      }

      .flip-base {
        transform-style: preserve-3d;
        transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
        transform: rotateY(0deg);
      }

      .flip-active-next {
        transform: rotateY(-180deg) translateX(-50%);
        opacity: 0;
      }

      .flip-active-prev {
        transform: rotateY(180deg) translateX(50%);
        opacity: 0;
      }

      /* Bulletproof classes for consistent flip states */
      .rotate-y-0 { transform: rotateY(0deg); }

      @keyframes studio-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.02); filter: brightness(1.1); }
      }
      .animate-studio-pulse {
        animation: studio-pulse 3s ease-in-out infinite;
      }

      .sparkle-particle {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        animation: sparkle-fade-out 0.8s forwards;
      }

      @keyframes sparkle-fade-out {
        0% { transform: scale(1) rotate(0deg); opacity: 1; }
        100% { transform: scale(0) rotate(270deg); opacity: 0; }
      }

      .studio-btn {
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 10px 0 rgba(0,0,0,0.1);
      }
      .studio-btn:active {
        transform: translateY(6px);
        box-shadow: 0 4px 0 rgba(0,0,0,0.1);
      }
      .studio-btn:disabled {
        transform: none;
        box-shadow: none;
        opacity: 0.5;
        cursor: not-allowed;
      }

      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { 
        background: #94a3b8; 
        border-radius: 6px; 
        border: 3px solid #f1f5f9;
      }

      @keyframes wave-live {
        0% { height: 8px; }
        50% { height: 32px; }
        100% { height: 8px; }
      }
      .wave-bar-live {
        width: 5px;
        background: #6366f1;
        border-radius: 4px;
        animation: wave-live 0.8s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="./styles.css" />
</head>
  <body class="selection:bg-indigo-100 nx-has-topnav overflow-x-hidden">
    
    <nav class="nxTopNav ui"></nav>
    <div id="app"></div>

    <!-- Key Modal (shared pattern) -->
    <div id="keyModal" class="hidden fixed inset-0 z-[9999] bg-black/50 backdrop-blur-sm flex items-center justify-center p-6">
      <div class="bg-white rounded-[2rem] w-full max-w-xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="p-8">
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="font-magic text-3xl text-slate-900">Connect Key</div>
              <div class="text-slate-500 mt-1">Connected • Ready • Synced</div>
            </div>
            <button id="keyCancel" class="bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-2xl px-4 py-2 font-semibold">Close</button>
          </div>
          <div class="mt-6">
            <label class="text-sm font-bold text-slate-600">Gemini API Key</label>
            <input id="apiKeyInput" type="password" class="mt-2 w-full text-lg px-5 py-4 rounded-[1.25rem] border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-indigo-100" placeholder="Paste key…" />
            <div id="apiKeySaved" class="mt-3 text-sm text-slate-500 italic">No key saved yet.</div>
          </div>
          <div class="mt-8 flex gap-3 justify-end">
            <button id="keySave" class="bg-indigo-600 hover:bg-indigo-500 text-white font-magic text-2xl px-8 py-4 rounded-[1.75rem] shadow-xl transition-all active:scale-95 border-b-[8px] border-indigo-800">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('mousemove', (e) => {
        if (Math.random() > 0.85) {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkle-particle font-magic text-indigo-400 pointer-events-none select-none';
          sparkle.style.left = e.clientX + 'px';
          sparkle.style.top = e.clientY + 'px';
          sparkle.innerText = ['✨', '🌟', '🌙', '💤'][Math.floor(Math.random() * 4)];
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 800);
        }
      });
    </script>
  <script src="./sleepystory.js" defer></script>

  <script src="../../shared/nexus-topnav-v2.js?v=sleepystory" defer></script>
</body>
</html>
